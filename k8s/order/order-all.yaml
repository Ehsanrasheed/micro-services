apiVersion: v1
kind: ConfigMap
metadata:
  name: order-config
data:
  MONGO_URI: "mongodb://admin:password123@mongodb:27017/orderdb?authSource=admin"
  PRODUCT_SERVICE_URL: "http://product-service:3002"
  USER_SERVICE_URL: "http://user-service:3001"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: MONGO_URI
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: PRODUCT_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: USER_SERVICE_URL

---

apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003
